version: '3.8'

services:
  backend:
    image: pipeanayaparada/elektra-backend:latest
    container_name: elektra_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # --- Configuración de Base de Datos ---
      - DATABASE_URL=${DATABASE_URL}
      
      # --- Configuración de IA (Gemini/OpenAI) ---
      - MODEL_PROVIDER=${MODEL_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      
      # --- Seguridad ---
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      
    env_file:
      - .env

    # Opcionalmente, para que el contenedor pueda resolver 'host.docker.internal' en Linux:
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: pipeanayaparada/elektra-frontend:latest
    container_name: elektra_frontend
    restart: unless-stopped
    ports:
      - "80:80" # El frontend se servirá en el puerto 80 (HTTP estándar)
    depends_on:
      - backend
